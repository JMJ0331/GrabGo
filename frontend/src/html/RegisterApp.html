<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/style.css">
    <title>GrabGo | Register</title>
</head>

<body>

    <!-- Registro -->

    <div class="container">

        <form action="" method="post" class="formulario">

            <h1 class="tituloPrincipal">Grab & Go</h1>

            <label for="userName" class="nombreInput">Usuario</label><br>
            <input type="text" id="userName" name="userName" required>

            <label for="correo" class="nombreInput">Correo:</label><br>
            <input type="text" id="correo" name="correo" required>

            <label for="contrasena" class="nombreInput">Contraseña:</label><br>
            <input type="text" id="contrasena" name="contrasena" required>

            <button type="submit" id="btnEnviar">Registrarse</button>

            <p class="redireccion" id="registro">¿Ya tienes una cuenta?</p>

        </form>
    </div>



</body>

</html>
