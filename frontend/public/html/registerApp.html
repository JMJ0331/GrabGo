<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/formularios.css">
    <title>Grab&Go | Registro</title>
</head>

<body>

    <div class="container">

        <!-- action y method eliminados — el submit lo maneja registro.js con fetch -->
        <form id="registerForm" class="formulario">

            <h1 class="tituloPrincipal">Grab & Go</h1>

            <div class="container-input">
                <label for="userName" class="nombreInput">Nombre</label>
                <input type="text" id="userName" name="userName" class="datos"
                    placeholder="Ingrese su nombre" required>
                <p id="errorUsuario" class="error"></p>
            </div>

            <div class="container-input">
                <label for="correo" class="nombreInput">Correo</label>
                <input type="text" id="correo" name="correo" class="datos"
                    placeholder="Ingrese su correo" required>
                <p id="errorCorreo" class="error"></p>
            </div>

            <div class="container-input">
                <label for="contrasena" class="nombreInput">Contraseña</label>
                <input type="password" id="contrasena" name="contrasena" class="datos"
                    placeholder="Ingrese su contraseña" required minlength="5">
                <p id="errorContrasena" class="error"></p>
            </div>

            <p id="errorGeneral" class="error"></p>

            <button type="submit" id="btnEnviar">Registrarse</button>

            <a href="../index.html" class="redireccion">
                ¿Ya tienes una cuenta?
            </a>

        </form>
    </div>

    <!-- Script descomentado y nombre corregido: "registo.js" → "registro.js" -->
    <script src="../js/registro.js"></script>

</body>

</html>
