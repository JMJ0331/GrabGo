<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grab&Go | Pagos</title>
    <link rel="stylesheet" href="../css/pagos.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">
</head>

<body>

    <div class="container">

        <header class="header">
            <div class="logo">
                <a href="#">Grab&Go</a>
            </div>
            <div id="menuToggle" class="menu-toggle">
                <i class="ri-menu-line"></i>
            </div>
            <nav id="navMenu" class="nav">
                <a href="ProductosApp.html">Productos</a>
                <a href="OrdenesApp.html">Ordenes</a>
                <a href="PagosApp.html">Pagos</a>
                <a href="../index.html">Salir</a>
            </nav>
        </header>

        <div class="cabecera-carrito">
            <h2>Total de productos añadidos: <span class="cantidad" id="totalProductos">0</span></h2>
        </div>

        <main class="contenido">

            <div class="sin-productos" id="sinProductos">
                <h1>Los productos que agregues se verán aquí</h1>
                <p>Ir a <a href="ProductosApp.html" class="redireccion">Productos</a></p>
            </div>

            <!-- Los items del carrito se generan dinámicamente desde pagos.js -->
            <section class="productos" id="listaCarrito"></section>

            <aside class="resumen">
                <div class="resumen-box">
                    <div class="icono-placeholder"></div>
                    <div class="totales">
                        <p>Sub-total: <span class="cantidad">RD$ <em id="sub-total">0</em></span></p>
                        <p>Envío: <span class="cantidad">RD$ <em id="envio">0</em></span></p>
                        <p>Impuesto: <span class="cantidad">RD$ <em id="impuesto">0</em></span></p>
                        <p>Monto total: <span class="cantidad">RD$ <em id="resultado">0</em></span></p>
                    </div>

                    <a href="TarjetaApp.html" class="btn" id="btnProceder">Proceder a pagar</a>

                    <div class="otros">
                        <p>Otros métodos</p>
                        <div class="metodos">
                            <a href="TarjetaApp.html"><span role="button" class="btn-apple"></span></a>
                            <a href="TarjetaApp.html"><span role="button" class="btn-paypal"></span></a>
                            <a href="TarjetaApp.html"><span role="button" class="btn-google"></span></a>
                        </div>
                    </div>
                </div>
            </aside>

        </main>

    </div>

    <!-- Script propio de pagos (antes cargaba modal.js por error) -->
    <script src="../js/pagos.js"></script>

</body>

</html>
