<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Grab&Go | Órdenes</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/microservicios.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">
</head>

<body>

    <div class="container">

        <header class="header">
            <div class="logo">
                <a href="#">Grab&Go</a>
            </div>
            <div id="menuToggle" class="menu-toggle">
                <i class="ri-menu-line"></i>
            </div>
            <nav id="navMenu" class="nav">
                <a href="ProductosApp.html">Productos</a>
                <a href="OrdenesApp.html">Ordenes</a>
                <a href="PagosApp.html">Pagos</a>
                <a href="../index.html">Salir</a>
            </nav>
        </header>

        <main class="contenido-col">

            <div class="acciones-modernas">
                <div class="botones-izq">
                    <button id="btnCrear" class="btn btn-crear">
                        <i class="ri-add-line"></i> Crear
                    </button>
                    <button id="btnActualizar" class="btn btn-actualizar">
                        <i class="ri-refresh-line"></i> Actualizar
                    </button>
                    <button id="btnEliminar" class="btn btn-eliminar">
                        <i class="ri-delete-bin-line"></i> Eliminar
                    </button>
                </div>
                <button id="btnFiltrar" class="btn btn-filtrar">
                    <i class="ri-filter-3-line"></i> Filtrar
                </button>
            </div>

            <div id="estadoVacio" class="estado-vacio">
                <div class="icono-wrapper">
                    <div class="icono">
                        <i class="ri-restaurant-line"></i>
                    </div>
                    <div class="check">
                        <i class="ri-check-line"></i>
                    </div>
                </div>
                <h2>No hay órdenes</h2>
                <p>Tu bandeja de entrada gastronómica está despejada.
                    Las nuevas solicitudes aparecerán aquí cuando los clientes comiencen a pedir.</p>
                <div class="acciones-vacio">
                    <button id="btnRefrescar" class="btn btn-crear">
                        <i class="ri-refresh-line"></i> Refrescar Vista
                    </button>
                    <a href="PagosApp.html" class="btn btn-filtrar">
                        <i class="ri-history-line"></i> Ver Historial
                    </a>
                </div>
            </div>

            <div class="grid" id="gridOrdenes"></div>

        </main>

    </div>

    <!-- Modal crear/actualizar orden -->
    <div id="modalOrden" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Nueva orden</h2>
            </div>
            <!-- Sin action ni method: lo maneja modal.js con fetch -->
            <div id="formOrden" class="modal-body">

                <label>Cliente</label>
                <input type="text" id="inputCliente" placeholder="Nombre del cliente">

                <label>Pedido</label>
                <textarea id="inputPedido" placeholder="Ej: 2 hamburguesas + refresco"></textarea>

                <label>Método de pago</label>
                <select id="inputPago">
                    <!-- Alineados con METODOS_VALIDOS del PaymentsService -->
                    <option value="tarjeta">Tarjeta</option>
                    <option value="efectivo">Efectivo</option>
                    <option value="transferencia">Transferencia</option>
                </select>

                <!-- Estados alineados con ESTADOS_VALIDOS del OrdersService -->
                <label>Estado del pedido</label>
                <select id="inputEstado">
                    <option value="pendiente">Pendiente</option>
                    <option value="en proceso">En proceso</option>
                    <option value="completado">Completado</option>
                    <option value="cancelado">Cancelado</option>
                </select>

                <button type="button" id="btnRegistrar" class="btn-registrar">
                    Registrar orden
                </button>

            </div>
        </div>
    </div>

    <!-- Modal filtro -->
    <div id="modalFiltro" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Filtrar pedidos</h2>
            </div>
            <div class="modal-body">
                <label>Selecciona estado</label>
                <!-- Estados alineados con ESTADOS_VALIDOS del OrdersService -->
                <select id="filtroEstado">
                    <option value="todos">Todos</option>
                    <option value="pendiente">Pendiente</option>
                    <option value="en proceso">En proceso</option>
                    <option value="completado">Completado</option>
                    <option value="cancelado">Cancelado</option>
                </select>
                <button id="btnAplicarFiltro" class="btn-registrar">
                    Aplicar filtro
                </button>
            </div>
        </div>
    </div>

    <script src="../js/modal.js"></script>

</body>

</html>
