<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../src/css/formularios.css">
    <title>GrabGo | Login</title>
</head>

<body>

    <div class="container">

        <form id="loginForm" class="formulario">

            <h1 class="tituloPrincipal">Grab & Go</h1>

            <div class="container-input">

                <label for="userName" class="nombreInput">Usuario</label>
                <input type="text" id="userName" class="datos" name="userName" placeholder="Usuario" required
                    autocomplete="off">

            </div>

            <div class="container-input">

                <label for="contrasena" class="nombreInput">Contraseña</label>
                <input type="password" id="contrasena" class="datos" name="contrasena" placeholder="Contraseña" required
                    autocomplete="off">

            </div>

            <button type="submit" id="btnEnviar">Iniciar sesión</button>

            <a href="../src/html/RegisterApp.html" class="redireccion">
                ¿No tienes una cuenta?
            </a>

        </form>
    </div>

    <script src="/js/script.js"></script>

</body>

</html>
